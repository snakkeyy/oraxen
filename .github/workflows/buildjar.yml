name: Build Oraxen for Paper

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Plugin
        # 'shadowJar' is often used in Oraxen to include all necessary libraries
        run: ./gradlew clean build shadowJar 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oraxen-Paper-Compatible
          path: build/libs/Oraxen*.jar
