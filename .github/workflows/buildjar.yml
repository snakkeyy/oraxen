name: Build Oraxen for Paper

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Plugin
        # Building specifically the shadowJar for the paper platform
        run: ./gradlew clean shadowJar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oraxen-Paper-Compatible
          # This wildcard path looks into all submodules (like platforms/paper/build/libs)
          path: "**/build/libs/Oraxen*.jar"
          # Optional: prevents the workflow from failing if a specific JAR isn't found
          if-no-files-found: error 
