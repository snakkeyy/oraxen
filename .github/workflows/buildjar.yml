name: Build Oraxen for Paper

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build All Modules
        # Since your folders are version-specific, we run a general build
        run: ./gradlew clean build shadowJar --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oraxen-All-Versions
          # This '**/ ' is the key: it searches every version folder (v1_21_R6, etc.) 
          # for a build/libs directory and grabs the JARs.
          path: "**/build/libs/*.jar"
          if-no-files-found: error
          # Optional: prevents the workflow from failing if a specific JAR isn't found
          if-no-files-found: error 
